<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>날마다성경 · 52주 암송</title>
  <!-- View-transition -->
  <style>@view-transition {navigation: auto;}::view-transition-group {animation-duration: 5s;}</style>

  <!-- Primary SEO -->
  <meta name="description" content="날마다성경 앱으로 성경통독과 암송을 쉽게 관리하세요. 주평강교회 성도들을 위한 웹앱입니다. 52주 말씀 암송과 365일 성경 통독을 쉽고 편리하게 체크하고 공유할 수 있어요." />
  <meta name="keywords" content="날마다성경, 성경 일독, 성경통독, 성경계획표, 성경 읽기, 성경 읽기 앱, 성경 읽기 계획, 매일 성경 읽기,주평강교회, 나의신앙생활, 웹앱, 52주 암송, 365일 일독, 성경 암송, 성경 읽기, 신앙생활, 기독교, 성경 공부" />
  <link rel="canonical" href="https://jshalom.netlify.app/memorize/" />

  <!-- Icon -->
  <link href="/favicon.ico?v=2" rel="shortcut icon" type="image/x-icon" />
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2563EB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Tailwind CDN (darkMode: class) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // ✅ tailwind 전역이 생긴 뒤에 설정 (Uncaught tailwind is not defined 방지)
    tailwind.config = { darkMode: "class" };
  </script>

  <script>
    // ✅ /memorize (슬래시 없음)으로 접속하면 상대경로 꼬일 수 있어 보정
    (function () {
      if (location.pathname === "/memorize") location.replace("/memorize/");
    })();
  </script>
</head>

<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  <div class="max-w-md mx-auto p-4 pb-24 space-y-4">
    <header class="pt-2 flex items-start justify-between">
      <button id="go-home"
        class="text-sm px-2 py-1 rounded-lg bg-white dark:bg-gray-800 shadow active:scale-[0.99]">
        🏠 홈
      </button>

      <div class="text-center flex-1">
        <h1 class="text-xl font-extrabold">52주 암송</h1>
      </div>

      <button id="open-sidenav"
        class="text-sm px-2 py-1 rounded-lg bg-white dark:bg-gray-800 shadow active:scale-[0.99]"
        aria-haspopup="dialog" aria-controls="sidenav" aria-expanded="false">
        ☰ 메뉴
      </button>
    </header>

    <div class="flex items-center justify-between gap-2">
      <div class="text-sm text-gray-500 dark:text-gray-300" id="week-badge"></div>
    </div>

    <!-- app.js가 채움 -->
    <section id="main-card"></section>
    <section id="tts-area"></section>

    <footer class="text-center text-xs text-gray-400 dark:text-gray-500 pt-2">
      <span id="progress"></span>
    </footer>
  </div>

  <!-- ✅ SideNav -->
  <div id="sidenav" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
    <div id="sidenav-overlay" class="absolute inset-0 bg-black/40"></div>

    <aside
      id="sidenav-panel"
      class="absolute right-0 top-0 h-full w-[86%] max-w-sm
             bg-white dark:bg-gray-800 shadow-2xl
             border-l border-gray-100 dark:border-gray-700
             transform translate-x-full transition-transform duration-200"
    >
      <div class="h-full flex flex-col">
        <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
          <div>
            <div class="text-sm font-extrabold text-gray-900 dark:text-gray-100">메뉴</div>
            <div class="text-xs text-gray-500 dark:text-gray-300 mt-0.5">52주 암송</div>
          </div>
          <button id="close-sidenav"
            class="px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700
                   text-gray-700 dark:text-gray-100 font-semibold active:scale-[0.99]">
            닫기
          </button>
        </div>

        <div class="p-4 space-y-4 flex-1 overflow-auto">
          <section class="rounded-2xl border border-gray-200 dark:border-gray-700 p-4">
            <div class="flex items-center justify-between gap-3">
              <div>
                <div class="text-sm font-semibold text-gray-900 dark:text-gray-100">다음 자동 진행</div>
                <div class="text-xs text-gray-500 dark:text-gray-300 mt-1">완료 후 자동으로 다음 미완료 주로 이동</div>
              </div>

              <label class="relative inline-flex items-center cursor-pointer select-none">
                <input id="auto-next-toggle" type="checkbox" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 dark:bg-gray-600 rounded-full peer peer-checked:bg-blue-600 transition"></div>
                <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
              </label>
            </div>
          </section>
        </div>

        <div class="p-4 border-t border-gray-100 dark:border-gray-700">
          <button id="open-reset"
            class="w-full rounded-xl bg-red-600 text-white py-3 font-semibold shadow-sm active:scale-[0.99]">
            🧹 진도 초기화하기
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- ✅ Reset Confirm Modal -->
  <div id="reset-modal" class="fixed inset-0 z-[60] hidden" role="dialog" aria-modal="true">
    <div id="reset-modal-overlay" class="absolute inset-0 bg-black/40"></div>

    <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 mx-auto max-w-md p-4">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700">
          <div class="text-sm font-extrabold text-gray-900 dark:text-gray-100">진도 초기화 확인</div>
          <div class="text-xs text-gray-500 dark:text-gray-300 mt-1">
            실수 방지를 위해 아래 칸에 <span class="font-semibold">아멘</span>을 입력해 주세요.
          </div>
        </div>

        <div class="p-4">
          <input id="reset-input" type="text" inputmode="text" autocomplete="off"
            placeholder="아멘"
            class="w-full rounded-xl border border-gray-200 dark:border-gray-700
                   bg-white dark:bg-gray-900
                   px-3 py-3 text-sm" />

          <div class="mt-2 text-[11px] text-gray-400 dark:text-gray-500 leading-relaxed">
            * 입력한 내용이 정확히 <span class="font-semibold">아멘</span>과 같을 때만 초기화됩니다.
          </div>

          <div class="mt-4 grid grid-cols-2 gap-2">
            <button id="reset-cancel"
              class="rounded-xl border border-gray-200 dark:border-gray-700 py-3 font-semibold active:scale-[0.99]">
              취소
            </button>

            <button id="reset-confirm" disabled
              class="rounded-xl bg-red-600 text-white py-3 font-semibold shadow-sm
                     disabled:opacity-40 disabled:cursor-not-allowed active:scale-[0.99]">
              초기화
            </button>
          </div>

          <div id="reset-status" class="mt-3 text-xs text-gray-500 dark:text-gray-300"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur border-t border-gray-200 dark:border-gray-700">
    <div class="mx-auto max-w-md px-4 py-3 grid grid-cols-3 gap-2">
      <button id="prev-btn" class="rounded-xl border border-gray-200 dark:border-gray-700 py-3 font-semibold">←</button>
      <button id="go-current" class="rounded-xl bg-blue-600 text-white py-3 font-semibold">이번 주</button>
      <button id="next-btn" class="rounded-xl border border-gray-200 dark:border-gray-700 py-3 font-semibold">→</button>
    </div>
  </nav>

  <!-- jQuery -->
  <script defer src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- SideNav/Reset Logic -->
  <script defer>
    (function () {
      const navRoot = document.getElementById("sidenav");
      const panel = document.getElementById("sidenav-panel");
      const openBtn = document.getElementById("open-sidenav");
      const closeBtn = document.getElementById("close-sidenav");
      const overlay = document.getElementById("sidenav-overlay");

      const resetModal = document.getElementById("reset-modal");
      const resetOverlay = document.getElementById("reset-modal-overlay");
      const resetOpen = document.getElementById("open-reset");
      const resetInput = document.getElementById("reset-input");
      const resetCancel = document.getElementById("reset-cancel");
      const resetConfirm = document.getElementById("reset-confirm");
      const resetStatus = document.getElementById("reset-status");

      function lockScroll(lock) {
        document.body.style.overflow = lock ? "hidden" : "";
      }

      function openNav() {
        navRoot.classList.remove("hidden");
        requestAnimationFrame(() => panel.classList.remove("translate-x-full"));
        openBtn?.setAttribute("aria-expanded", "true");
        lockScroll(true);
        window.SiteOverlay?.open("sidenav", closeNav);
      }

      function closeNav() {
        panel.classList.add("translate-x-full");
        openBtn?.setAttribute("aria-expanded", "false");
        lockScroll(false);
        setTimeout(() => navRoot.classList.add("hidden"), 200);
        window.SiteOverlay?.close("sidenav");
      }

      openBtn?.addEventListener("click", openNav);
      closeBtn?.addEventListener("click", () => window.SiteOverlay?.close("sidenav") ?? closeNav());
      overlay?.addEventListener("click", () => window.SiteOverlay?.close("sidenav") ?? closeNav());

      function openReset() {
        resetModal.classList.remove("hidden");
        resetInput.value = "";
        resetConfirm.disabled = true;
        resetStatus.textContent = "";
        lockScroll(true);
        setTimeout(() => resetInput.focus(), 50);
      }

      function closeReset() {
        resetModal.classList.add("hidden");
        lockScroll(false);
      }

      resetOpen?.addEventListener("click", () => {
        closeNav();
        openReset();
      });

      resetCancel?.addEventListener("click", closeReset);
      resetOverlay?.addEventListener("click", closeReset);

      resetInput?.addEventListener("input", () => {
        const ok = resetInput.value.trim() === "아멘";
        resetConfirm.disabled = !ok;
        resetStatus.textContent = ok ? "확인되었습니다. ‘초기화’를 누르면 삭제됩니다." : "";
      });

      resetConfirm?.addEventListener("click", () => {
        const removeKeys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!k) continue;
          if (k.startsWith("memorized:")) removeKeys.push(k);
          if (k === "memorize:options:v1") removeKeys.push(k);
        }
        removeKeys.forEach((k) => localStorage.removeItem(k));

        resetStatus.textContent = "초기화가 완료되었습니다. 페이지를 새로고침합니다…";
        setTimeout(() => location.reload(), 600);
      });

      window.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        if (!navRoot.classList.contains("hidden")) closeNav();
        if (!resetModal.classList.contains("hidden")) closeReset();
      });
    })();
  </script>

  <!-- confetti -> site.js -> app.js -->
  <script defer src="/js/confetti.browser.min.js"></script>
  <script defer src="/js/site.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
